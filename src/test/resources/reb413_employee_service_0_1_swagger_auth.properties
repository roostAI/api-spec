# API Configuration
api.baseUrl=<your-api-base-url> # The base URL of the API
api.environment=<your-api-environment> # The environment of the API (e.g., dev, prod)

# Authentication - Scheme Name
# Replace 'SchemeName' with the name of your authentication scheme
SchemeName_apiKey=<your-api-key> # The API key for the 'SchemeName' authentication scheme
SchemeName_username=<your-username> # The username for the 'SchemeName' authentication scheme
SchemeName_password=<your-password> # The password for the 'SchemeName' authentication scheme
SchemeName_token=<your-token> # The token for the 'SchemeName' authentication scheme