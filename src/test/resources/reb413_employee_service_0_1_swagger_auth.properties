# API Configuration
api.baseUrl=<your-api-base-url> # The base URL of the API
api.environment=<your-api-environment> # The environment of the API

# Authentication - Scheme Name
schemeName_apiKey=<your-api-key> # The API key for the given scheme
schemeName_username=<your-username> # The username for the given scheme
schemeName_password=<your-password> # The password for the given scheme
schemeName_token=<your-token> # The token for the given scheme

# Example:
# api.baseUrl=https://virtserver.swaggerhub.com/061REB413/employee-service/0.1
# api.environment=dev
# schemeName_apiKey=1234567890abcdef
# schemeName_username=admin
# schemeName_password=admin123
# schemeName_token=abcdef1234567890