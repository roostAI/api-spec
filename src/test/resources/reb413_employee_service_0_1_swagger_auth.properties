# API Configuration
api.baseUrl=<your-api-base-url> # The base URL of your API
api.environment=<your-api-environment> # The environment of your API

# Authentication - Scheme Name
# Replace 'SchemeName' with the name of your authentication scheme
SchemeName_apiKey=<your-api-key> # The API key for 'SchemeName' authentication
SchemeName_username=<your-username> # The username for 'SchemeName' authentication
SchemeName_password=<your-password> # The password for 'SchemeName' authentication
SchemeName_token=<your-token> # The token for 'SchemeName' authentication