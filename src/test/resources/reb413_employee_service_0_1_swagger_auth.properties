# API Configuration
api.baseUrl=<your-api-base-url> # Base URL of the API
api.environment=<your-api-environment> # Environment of the API

# Authentication - Scheme Name
# Replace 'SchemeName' with the name of your authentication scheme
SchemeName_apiKey=<your-api-key> # API Key for the authentication scheme
SchemeName_username=<your-username> # Username for the authentication scheme
SchemeName_password=<your-password> # Password for the authentication scheme
SchemeName_token=<your-token> # Token for the authentication scheme