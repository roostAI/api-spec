# API Configuration
api.baseUrl=<your-api-base-url> # Base URL of the API
api.environment=<your-api-environment> # Environment of the API, e.g. dev, prod

# Authentication - Scheme Name
SchemeName_apiKey=<your-api-key> # API Key for the Scheme
SchemeName_username=<your-username> # Username for the Scheme
SchemeName_password=<your-password> # Password for the Scheme
SchemeName_token=<your-token> # Token for the Scheme