# API Configuration
api.baseUrl=<your-api-base-url> # Base URL of the API
api.environment=<your-api-environment> # Environment of the API, e.g., dev, prod

# Authentication - Scheme Name
# Replace 'SchemeName' with the name of your authentication scheme
SchemeName_apiKey=<your-api-key> # API key for the 'SchemeName' authentication scheme
SchemeName_username=<your-username> # Username for the 'SchemeName' authentication scheme
SchemeName_password=<your-password> # Password for the 'SchemeName' authentication scheme
SchemeName_token=<your-token> # Token for the 'SchemeName' authentication scheme

# Default values
api.baseUrl=https://virtserver.swaggerhub.com/061REB413/employee-service/0.1 # Default API base URL
api.environment=dev # Default API environment